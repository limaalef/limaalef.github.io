<body class="theme-football">
    <header>
        <div class="header-content">
            <div class="logo-container">
                <a href="index.html">
                    <img src="logo.png" alt="Logo" class="site-logo-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                    <div class="site-logo" style="display: none;">🏆</div>
                </a>
            </div>
            
            <div class="sport-selector">
                <button class="sport-btn football active" data-sport="football" id="footballBtn">
                    ⚽<span data-i18n="football">Futebol</span>
                </button>
                <button class="sport-btn others" data-sport="others" id="othersBtn">
                    🏀<span data-i18n="otherSports">Outros Esportes</span>
                </button>
                <button class="sport-btn motor" data-sport="motor" id="motorBtn">
                    🏎️<span data-i18n="motorSports">Automobilismo</span>
                </button>
            </div>
        </div>
    </header>
    
    <div class="container">
        <div class="stats-container">
            <div class="stats" id="stats" style="display: none;">
                <div class="stat">
                    <div class="stat-value highlighted" id="totalGames">0</div>
                    <div class="stat-label" data-i18n="games">Jogos</div>
                </div>
                <div class="stat">
                    <div class="stat-value highlighted" id="totalSize">0 GB</div>
                    <div class="stat-label" data-i18n="totalSize">Tamanho Total</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="totalDuration">0h</div>
                    <div class="stat-label" data-i18n="totalDuration">Duração Total</div>
                </div>
            </div>
        </div>

        <div class="controls">
            <div class="filter-options">
                <div class="filter-sub-group">
                    <div class="control-group" style="max-width: 95px;">
                        <div class="dropdown-group">
                            <label data-i18n="items">Itens:</label>
                            <select class="f-select highlighted" id="itemsPerPage">
                                <option value="50">50</option>
                                <option value="200" selected>200</option>
                                <option value="1000">1000</option>
                            </select>
                        </div>
                    </div>
                    <div class="control-group" style="max-width: 150px;">
                        <div class="dropdown-group">
                            <label data-i18n="items">Itens:</label>
                            <select class="f-select" id="yearFilter">
                                <option value="" data-i18n="allYears">Todos os anos</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="filter-sub-group">
                    <div class="search-box">
                        <input type="text" id="searchInput" data-i18n-placeholder="search" placeholder="🔍 Buscar...">
                    </div>
                </div>
            </div>

            <div class="filter-options">
                <div class="filter-sub-group">
                    <div class="view-toggle">
                        <div class="view-btn active" data-view="cards">
                            <svg width="11" height="11" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="5" height="5" rx="1"></rect><rect x="8" y="1" width="5" height="5" rx="1"></rect><rect x="1" y="8" width="5" height="5" rx="1"></rect><rect x="8" y="8" width="5" height="5" rx="1"></rect></svg>
                            <span data-i18n="cards">Cartões</span>
                        </div>
                        
                        <div class="view-btn" data-view="list">
                            <svg width="11" height="11" viewBox="0 0 14 14" fill="none"><path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                            <span data-i18n="list">Lista</span>
                        </div>
                    </div>

                    <div class="view-toggle">
                        <div class="video-filter-btn" id="videoFilterBtn">
                            <svg width="11" height="11" viewBox="0 0 24 24" fill="none">
                                <polygon points="5,3 19,12 5,21" fill="currentColor"/>
                            </svg>
                            <span data-i18n="withVideo">Com Vídeo</span>
                        </div>
                    </div>
                    
                    <div class="view-toggle">
                        <div class="lang-btn" id="langToggle" title="Change language / Mudar idioma">
                            <span id="langFlag">🇧🇷</span>
                        </div>
                    </div>
                </div>
                <div class="filter-sub-group">
                    <div class="pagination" id="pagination">
                        <div class="back-btn-group">
                            <button id="firstPage">«</button>
                            <button id="prevPage">‹</button>
                        </div>
                        <div class="pages-info-group">
                            <span class="label hidden" data-i18n="page">Página</span>
                            <span class="value contrast" id="pageNumber">1</span>
                            <span class="label" data-i18n="pageSeparator">de</span>
                            <span class="value" id="pageTotal">1</span>
                        </div>
                        <div class="back-btn-group">
                            <button id="nextPage">›</button>
                            <button id="lastPage">»</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="match-container" id="matchesContainer">
            <div class="empty-state">
                <h2 data-i18n="loading">Carregando jogos...</h2>
                <p data-i18n="loadingMessage">Aguarde enquanto buscamos os dados</p>
            </div>
        </div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <button class="close-btn" onclick="MatchModal.close()">×</button>
                <h2 class="modal-title" id="modalTitle">Detalhes da Partida</h2>
                <div id="modalScore" class="modal-score"></div>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>
    
    <!-- Footer -->
    <div id="footer"></div>

    <script src="js/utils.js"></script>

    <script src="js/managers.js"></script>
    <script src="js/app.js"></script>
