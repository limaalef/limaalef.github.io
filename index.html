<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Coleção de Esportes</title>

    <meta name="description" content="Arquivo pessoal de jogos e eventos esportivos. Futebol, automobilismo e outros esportes.">
    <meta name="keywords" content="futebol, esportes, automobilismo, jogos, coleção, arquivo, vídeos">
    <meta name="author" content="@limaalef">

    <meta property="og:type" content="website">
    <meta property="og:url" content="http://archive.limaalef.com/">
    <meta property="og:title" content="Minha Coleção de Esportes">
    <meta property="og:description" content="Arquivo pessoal de jogos e eventos esportivos.">
    <meta property="og:image" content="http://archive.limaalef.com/banner.png">
    <meta property="og:site_name" content="Minha Coleção de Esportes">
    <meta property="og:locale" content="pt_BR">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:creator" content="@limaalef">

    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-JJZTBEGJ91"></script>
<script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-JJZTBEGJ91');
</script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2751752344986877"
crossorigin="anonymous"></script>
<body>
    <header>
        <div class="header-content">
            <div class="logo-container">
                <img src="logo.png" alt="Logo" class="site-logo-img"
                    onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                <div class="site-logo" style="display:none;">🏆</div>
            </div>
            <div style="flex:1"></div>
            <div class="control-group">
                <button id="langToggle" class="lang-btn" style="display: none;"
                        title="Change language / Mudar idioma">
                    <span id="langFlag">🇧🇷</span>
                </button>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="home-container">
            <h2 data-i18n="homeTitle">Confira a coleção por categoria</h2>

            <!-- sport navigation -->
            <div class="sport-nav">
                <a href="collection.html?sport=football" class="sport-nav-card">
                    <span class="nav-icon">⚽</span>
                    <span data-i18n="football">Futebol</span>
                </a>
                <a href="collection.html?sport=others" class="sport-nav-card">
                    <span class="nav-icon">🏀</span>
                    <span data-i18n="otherSports">Outros Esportes</span>
                </a>
                <a href="collection.html?sport=motor" class="sport-nav-card">
                    <span class="nav-icon">🏎️</span>
                    <span data-i18n="motorSports">Automobilismo</span>
                </a>
                <a href="https://acervo.dirsoament.com" class="sport-nav-card">
                    <span class="nav-icon">🔗</span>
                    <span data-i18n="dirsoament">Coleção do Dirso Ament</span>
                </a>
            </div>

            <!-- ── SECTION: today in history ── -->
            <div class="home-section">
                <div class="home-section-header">
                    <h2>📅 <span data-i18n="sectionTodayTitle">Hoje na história</span></h2>
                </div>
                <div class="today-history-wrapper">
                    <button class="tih-nav-btn" id="tihPrev" aria-label="Anterior">‹</button>
                    <div class="today-history-list" id="todayHistory">
                        <div class="section-state">
                            <p data-i18n="loading">Carregando jogos...</p>
                        </div>
                    </div>
                    <button class="tih-nav-btn" id="tihNext" aria-label="Próximo">›</button>
                </div>
                <div class="tih-pagination" id="tihPagination" style="display:none;">
                    <span id="tihPageInfo"></span>
                </div>
            </div>

            <!-- ── SECTION 1: recent changes ── -->
            <div class="home-section">
                <div class="home-section-header">
                    <h2>📋 <span data-i18n="sectionChangesTitle">Últimas alterações</span></h2>
                    <a href="changelog.html" class="section-link" data-i18n="seeAllLink">Ver tudo →</a>
                </div>
                <div class="changelog-list" id="recentChanges">
                    <div class="section-state">
                        <div class="icon">⏳</div>
                        <p data-i18n="loadingChanges">Carregando alterações recentes...</p>
                    </div>
                </div>
            </div>

            <!-- ── SECTION 2: HD storage (coming soon) ── -->
            <div class="home-section">
                <div class="home-section-header">
                    <h2>💾 <span data-i18n="sectionHDTitle">Espaço em HDs</span></h2>
                </div>
                <div class="coming-soon-body">
                    <div class="coming-soon-icon">🔧</div>
                    <p data-i18n="comingSoonHD">Em breve</p>
                </div>
            </div>
        </div>

        <div class="modal" id="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <button class="close-btn" onclick="MatchModal.close()">×</button>
                    <h2 id="modalTitle">Detalhes da Partida</h2>
                    <div id="modalScore" style="font-size: 1.8em; margin-top: 8px;"></div>
                </div>
                <div class="modal-body" id="modalBody"></div>
            </div>
        </div>

    </div>

    <!-- Footer -->
    <div id="footer"></div>

    <script src="js/config.js"></script>
    <script src="js/translation.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.service.js"></script>
    <script src="js/managers.js"></script>
    <script src="js/index.js"></script>

</body>
</html>
