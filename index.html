<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Coleção de Esportes</title>

    <meta name="description" content="Arquivo pessoal de jogos e eventos esportivos. Futebol, automobilismo e outros esportes.">
    <meta name="keywords" content="futebol, esportes, automobilismo, jogos, coleção, arquivo, vídeos">
    <meta name="author" content="@limaalef">

    <meta property="og:type" content="website">
    <meta property="og:url" content="http://archive.limaalef.com/">
    <meta property="og:title" content="Minha Coleção de Esportes">
    <meta property="og:description" content="Arquivo pessoal de jogos e eventos esportivos.">
    <meta property="og:image" content="http://archive.limaalef.com/banner.png">
    <meta property="og:site_name" content="Minha Coleção de Esportes">
    <meta property="og:locale" content="pt_BR">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:creator" content="@limaalef">

    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo-container">
                <img src="logo.png" alt="Logo" class="site-logo-img"
                    onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                <div class="site-logo" style="display:none;">🏆</div>
            </div>
            <div style="flex:1"></div>
            <div class="control-group">
                <button id="langToggle" class="lang-btn" style="padding:10px 14px;"
                        title="Change language / Mudar idioma">
                    <span id="langFlag">🇧🇷</span>
                </button>
            </div>
        </div>
    </header>

    <div class="container">
    <div class="home-container">

        <!-- sport navigation -->
        <div class="sport-nav">
            <a href="collection.html" class="sport-nav-card">
                <span class="nav-icon">⚽</span>
                <span data-i18n="football">Futebol</span>
            </a>
            <a href="collection.html?sport=others" class="sport-nav-card">
                <span class="nav-icon">🏀</span>
                <span data-i18n="otherSports">Outros Esportes</span>
            </a>
            <a href="collection.html?sport=motor" class="sport-nav-card">
                <span class="nav-icon">🏎️</span>
                <span data-i18n="motorSports">Automobilismo</span>
            </a>
        </div>

        <!-- ── SECTION 1: recent changes ── -->
        <div class="home-section">
            <div class="home-section-header">
                <h2>📋 <span data-i18n="sectionChangesTitle">Últimas Alterações</span></h2>
                <a href="changelog.html" class="section-link" data-i18n="seeAllLink">Ver tudo →</a>
            </div>
            <div class="changelog-list" id="recentChanges">
                <div class="section-state">
                    <div class="icon">⏳</div>
                    <p data-i18n="loadingChanges">Carregando alterações recentes...</p>
                </div>
            </div>
        </div>

        <!-- ── SECTION 2: HD storage (coming soon) ── -->
        <div class="home-section">
            <div class="home-section-header">
                <h2>💾 <span data-i18n="sectionHDTitle">Espaço em HDs</span></h2>
            </div>
            <div class="coming-soon-body">
                <div class="coming-soon-icon">🔧</div>
                <p data-i18n="comingSoonHD">Em breve</p>
            </div>
        </div>

        <!-- ── SECTION 3: other data (coming soon) ── -->
        <div class="home-section">
            <div class="home-section-header">
                <h2>📊 <span data-i18n="sectionDataTitle">Outros Dados</span></h2>
            </div>
            <div class="coming-soon-body">
                <div class="coming-soon-icon">🔧</div>
                <p data-i18n="comingSoonData">Em breve</p>
            </div>
        </div>

    </div>
    </div>

    <!-- Footer -->
    <div id="footer"></div>

    <script src="js/config.js"></script>
    <script src="js/translation.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
