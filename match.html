<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
    <title>Partida — Sports Archive</title>
    <meta name="description" content="Detalhes completos da partida no arquivo esportivo pessoal.">
    <meta name="robots" content="noindex">
    <meta name="author" content="@limaalef">

    <link rel="icon" type="image/png" href="/icons/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
    <link rel="shortcut icon" href="/icons/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/icons/site.webmanifest" />

    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/event.css">
    <link rel="stylesheet" href="css/match.css">
</head>

<script async src="https://www.googletagmanager.com/gtag/js?id=G-JJZTBEGJ91"></script>
<script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-JJZTBEGJ91');
</script>

<body class="theme-football">
    <header>
        <div class="header-frame" id="header"
            data-title="Partida"
            data-back="true">
        </div>

        <div class="control-group">
            <button id="langToggle" class="lang-btn" style="display: none;"
                    title="Change language / Mudar idioma">
                <span id="langFlag">🇧🇷</span>
            </button>
        </div>
    </header>

    <div class="container">

        <!-- Loading state -->
        <div id="matchEnrichedLoading">
            <div class="state-box">
                <div class="icon">⏳</div>
                <h2>Carregando partida...</h2>
            </div>
        </div>

        <!-- Erro -->
        <div id="matchEnrichedError" style="display:none;">
            <div class="state-box">
                <div class="icon">❌</div>
                <h2>Partida não encontrada</h2>
                <p>Verifique o ID na URL e tente novamente.</p>
            </div>
        </div>

        <!-- Conteúdo -->
        <div id="matchEnrichedContent" style="display:none;">

            <!-- ── HERO: carousel de imagens + placar ── -->
            <div class="me-hero" id="meHero"></div>

            <!-- ── SEÇÕES ── -->
            <div class="me-body" id="meBody">
                <div class="modal-body" id="modalBody">
                    <div id="image-carousel"></div>

                    <!-- MATCH INFO -->
                    <div class="modal-division">
                        <div class="detail-section">
                            <div class="section-title modal-style" data-i18n="tvInfo"></div>
                            <div class="detail-list" id="meTvInfo"></div>
                        </div>

                        <div class="detail-section">
                            <div class="section-title modal-style" data-i18n="technicalInfo"></div>
                            <div class="detail-list" id="meTechInfo"></div>
                        </div>

                        <div class="detail-section" id="meRefereeSection" style="display:none;">
                            <div class="section-title modal-style" data-i18n="refereeInfo"></div>
                            <div class="detail-list" id="meRefereeInfo"></div>
                        </div>

                        <div class="detail-section">
                            <div class="section-title modal-style" data-i18n="storageInfo"></div>
                            <div class="storage-badges" id="meStorageBadges"></div>
                        </div>
                    </div>
                </div>

                <div>
                    <div class="me-section" id="meLineupSection" style="display:none;">
                        <div class="section-title modal-style" data-i18n="lineup"></div>
                        <div class="me-lineup-grid" id="meLineupGrid"></div>
                    </div>

                    <div class="me-section" id="mePlaysSection" style="display:none;">
                        <div class="section-title modal-style" data-i18n="goals">
                            <span class="home-section-detail" id="mePlaysCount"></span>
                        </div>
                        <div class="detail-list goals-list" id="mePlaysList"></div>
                    </div>

                    <div class="detail-section">
                        <div class="section-title modal-style" data-i18n="statistics"></div>
                        <div class="me-stats-list" id="meStatisticsInfo"></div>
                    </div>

                    <!-- MOMENTOS MARCANTES (tags) -->
                    <div class="detail-section" id="meTagsSection" style="display:none;">
                        <div class="section-title modal-style" data-i18n="observations"></div>
                        <div class="detail-item" style="grid-column: 1/-1;">
                            <div class="detail-value" id="meObs"></div>
                        </div>
                        <div class="me-tags-wrap" id="meTagsList"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="footer"></div>

    <script src="js/config.js"></script>
    <script src="js/translation.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.service.js"></script>
    <script src="js/managers.js"></script>
    <script src="js/match.js"></script>
</body>
</html>
