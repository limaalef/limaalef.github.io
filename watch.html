<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
    <title>Assistir — Sports Archive</title>
    <meta name="description" content="Assista a jogos completos com qualidade direto do meu arquivo pessoal.">
    <meta name="robots" content="noindex">
    <meta name="author" content="@limaalef">

    <!-- Open Graph -->
    <meta property="og:type" content="video.other">
    <meta property="og:url" content="http://archive.limaalef.com/watch" id="og-url">
    <meta property="og:title" content="Assistir jogo - Sports Archive" id="og-title">
    <meta property="og:description" content="Assista a jogos completos com qualidade direto do meu arquivo pessoal." id="og-description">
    <meta property="og:image" content="http://archive.limaalef.com/banner.png" id="og-image">
    <meta property="og:image:width" content="763">
    <meta property="og:image:height" content="241">
    <meta property="og:site_name" content="Sports Archive">
    <meta property="og:locale" content="pt_BR">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="player">
    <meta name="twitter:url" content="http://archive.limaalef.com/watch" id="twitter-url">
    <meta name="twitter:title" content="Assistir jogo - Sports Archive" id="twitter-title">
    <meta name="twitter:description" content="Assista a jogos completos com qualidade direto do meu arquivo pessoal." id="twitter-description">
    <meta name="twitter:image" content="http://archive.limaalef.com/banner.png" id="twitter-image">
    <meta name="twitter:creator" content="@limaalef">
    <meta name="twitter:site" content="@limaalef">

    <link rel="icon" type="image/png" href="/icons/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
    <link rel="shortcut icon" href="/icons/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/icons/site.webmanifest" />

    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/match.css">
    <link rel="stylesheet" href="css/watch.css">
</head>

<script async src="https://www.googletagmanager.com/gtag/js?id=G-JJZTBEGJ91"></script>
<script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-JJZTBEGJ91');
</script>

<body>
    <header>
        <div class="header-frame" id="header"
            data-title="Assistir"
            data-back="true">
        </div>

        <div class="control-group">
            <button id="langToggle" class="lang-btn" style="display: none;"
                    title="Change language / Mudar idioma">
                <span id="langFlag">🇧🇷</span>
            </button>
        </div>
    </header>

    <div class="container">

        <!-- Loading -->
        <div id="watchLoading">
            <div class="state-box">
                <div class="icon">⏳</div>
                <h2>Carregando partida...</h2>
            </div>
        </div>

        <!-- Erro -->
        <div id="watchError" style="display:none;">
            <div class="state-box">
                <div class="icon">❌</div>
                <h2>Partida não encontrada</h2>
                <p>Verifique o ID na URL e tente novamente.</p>
            </div>
        </div>

        <!-- Conteúdo -->
        <div id="watchContent" style="display:none;">

            <!-- Hero: mesmo padrão do match -->
            <div class="me-hero" id="watchHero"></div>

            <!-- Vídeo + Escalações -->
            <div class="watch-video-section">

                <div class="me-lineup-col watch-lineup-col" id="watchHomeLineup">
                    <div class="me-lineup-team-header">
                        <div class="me-lineup-team-info">
                            <div class="me-lineup-team-name" id="watchHomeTeamName">—</div>
                            <div class="me-lineup-formation" id="watchHomeFormation"></div>
                        </div>
                    </div>
                    <div id="watchHomeLineupList"></div>
                </div>

                <div class="watch-player-wrap">
                    <div class="video-container-watch">
                        <iframe
                            id="videoPlayer"
                            src=""
                            frameborder="0"
                            allowfullscreen
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                            style="display:none;">
                        </iframe>
                        <div id="videoPlaceholder" class="watch-video-placeholder">
                            <div class="icon">🎥</div>
                            <div data-i18n="videoUnavailable">Vídeo não disponível</div>
                        </div>
                    </div>
                </div>

                <div class="me-lineup-col watch-lineup-col" id="watchAwayLineup">
                    <div class="me-lineup-team-header">
                        <div class="me-lineup-team-info">
                            <div class="me-lineup-team-name" id="watchAwayTeamName">—</div>
                            <div class="me-lineup-formation" id="watchAwayFormation"></div>
                        </div>
                    </div>
                    <div id="watchAwayLineupList"></div>
                </div>
            </div>

            <!-- Informações abaixo do player: duas colunas iguais -->
            <div class="me-body watch-info-body" id="watchBody">

                <div class="modal-body">
                    <div class="modal-division">
                        <div class="detail-section">
                            <div class="section-title modal-style" data-i18n="tvInfo"></div>
                            <div class="detail-list" id="watchTvInfo"></div>
                        </div>

                        <div class="detail-section">
                            <div class="section-title modal-style" data-i18n="technicalInfo"></div>
                            <div class="detail-list" id="watchTechInfo"></div>
                        </div>

                        <div class="detail-section">
                            <div class="section-title modal-style" data-i18n="storageInfo"></div>
                            <div class="storage-badges" id="meStorageBadges"></div>
                        </div>
                    </div>
                </div>

                <div>
                    <div class="me-section" id="mePlaysSection" style="display:none;">
                        <div class="section-title modal-style" data-i18n="plays"></div>
                        <div class="detail-list plays-list" id="mePlaysList"></div>
                    </div>

                    <div class="detail-section">
                        <div class="section-title modal-style" data-i18n="statistics"></div>
                        <div class="detail-list me-stats-list" id="meStatisticsInfo"></div>
                    </div>
                </div>

            </div>

        </div>
    </div>

    <div id="footer"></div>

    <script src="js/config.js"></script>
    <script src="js/translation.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.service.js"></script>
    <script src="js/managers.js"></script>
    <script src="js/watch.js"></script>
</body>
</html>
