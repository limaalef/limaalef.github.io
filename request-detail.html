<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido | Sports Archive</title>
    <meta name="robots" content="noindex">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/request.css">
    <link rel="stylesheet" href="css/admin.css">
<style>
.rd-wrap { max-width: 760px; margin: 0 auto; padding: 0 var(--sp-5) var(--sp-9); }

/* Auth */
#rd-auth { display:flex; flex-direction:column; align-items:center; gap:var(--sp-5);
    padding:var(--sp-9) var(--sp-5); text-align:center; }
#rd-auth h2 { color:var(--text-primary); margin:0; font-size:var(--font-size-xxl); }
#rd-auth p  { color:var(--text-secondary); margin:0; font-size:var(--font-size-mdm); }
.rd-loading { text-align:center; padding:var(--sp-9) var(--sp-5);
    color:var(--text-secondary); font-size:var(--font-size-mdm); }

    /* Progress bar */
.rd-progress { display:flex; border-radius:var(--border-radius-size-md);
    overflow:hidden; border:1px solid var(--border-color); margin-bottom:var(--sp-6); }
.rd-progress-step { flex:1; text-align:center; padding:var(--sp-3) var(--sp-2);
    font-size:var(--font-size-xs); font-weight:600; text-transform:uppercase;
    letter-spacing:.04em; color:var(--text-secondary); background:var(--bg-primary); transition:all .2s; }
.rd-progress-step + .rd-progress-step { border-left:1px solid var(--border-color); }
.rd-progress-step.done    { background:var(--bg-success); color:var(--text-success); }
.rd-progress-step.current { background:var(--accent-color); color:var(--text-accent-color); }

/* Sections */
.rd-section { margin-bottom:var(--sp-6); }
.rd-section-title { font-size:var(--font-size-xs); text-transform:uppercase;
    letter-spacing:.07em; color:var(--accent-color); margin-bottom:var(--sp-3); }

/* Download cards */
.rd-dl-list { display:flex; flex-direction:column; gap:var(--sp-4); }
.rd-dl-card { border-radius:var(--border-radius-size-xl); border:1px solid var(--border-color); overflow:hidden; }
.rd-dl-card.available { border-color:var(--success-color); }
.rd-dl-card-head { display:flex; align-items:center; gap:var(--sp-4);
    padding:var(--sp-4) var(--sp-5); background:var(--bg-secondary); }
.rd-dl-card.available .rd-dl-card-head { background:var(--bg-success); }
.rd-dl-icon { font-size:1.5rem; flex-shrink:0; }
.rd-dl-info { flex:1; min-width:0; }
.rd-dl-label { font-size:var(--font-size-mdm); font-weight:600; color:var(--text-primary); }
.rd-dl-sub   { font-size:var(--font-size-mds); color:var(--text-secondary); margin-top:var(--sp-1); }
.rd-dl-card-body { padding:var(--sp-4) var(--sp-5); border-top:1px solid var(--border-color); background:var(--bg-primary); }
.rd-dl-status-row { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:var(--sp-3); }
.rd-dl-exp { font-size:var(--font-size-sm); }
.rd-dl-exp.valid     { color:var(--text-success); }
.rd-dl-exp.expired   { color:var(--error-color); }
.rd-dl-exp.indefinite { color:var(--text-secondary); }
.rd-dl-exp.disabled  { color:var(--text-tertiary); }
.rd-dl-pending { padding:var(--sp-4) var(--sp-5); background:var(--bg-primary);
    color:var(--text-tertiary); font-size:var(--font-size-sm);
    border-top:1px solid var(--border-color); text-align:center; }

/* Info list */
.rd-info-list { display:flex; flex-direction:column; gap:1px;
    border:1px solid var(--border-color); border-radius:var(--border-radius-size-xl); overflow:hidden; }
.rd-info-item { background:var(--bg-secondary); padding:var(--sp-3) var(--sp-4);
    display:flex; align-items:center; justify-content:space-between; }
.rd-info-item:not(:last-child) { border-bottom:1px solid var(--border-color); }
.rd-info-label { font-size:var(--font-size-sm); color:var(--text-secondary); width:35%; }
.rd-info-value { font-size:var(--font-size-mdm); font-weight:600; color:var(--text-primary); text-align:right; width:65%; }
.rd-notes { padding:var(--sp-3) var(--sp-4); background:var(--bg-secondary);
    border-radius:var(--border-radius-size-md); border-left:3px solid var(--accent-color);
    font-size:var(--font-size-sm); color:var(--text-secondary); }

/* ═══════════════════════════════════════════════
   PAGAMENTO — card Pix
═══════════════════════════════════════════════ */
.rd-pay-card { border: 1px solid var(--border-color); border-radius: var(--border-radius-size-xl);
    overflow: hidden; margin-bottom: var(--sp-6); }
.rd-pay-card.pay-required { border-color: var(--warning-color); }
.rd-pay-card.pay-pending  { border-color: var(--accent-color); }
.rd-pay-card.pay-done     { border-color: var(--success-color); }

.rd-pay-head { display: flex; align-items: center; gap: var(--sp-4);
    padding: var(--sp-4) var(--sp-5); }
.rd-pay-card.pay-required .rd-pay-head { background: var(--bg-warning); }
.rd-pay-card.pay-pending  .rd-pay-head { background: var(--bg-info); }
.rd-pay-card.pay-done     .rd-pay-head { background: var(--bg-success); }
.rd-pay-icon  { font-size: 1.6rem; flex-shrink: 0; }
.rd-pay-title { font-size: var(--font-size-mdm); font-weight: 700; color: var(--text-primary); }
.rd-pay-sub   { font-size: var(--font-size-sm); color: var(--text-secondary); margin-top: 2px; }
.rd-pay-amount { font-size: var(--font-size-mxxl); font-weight: 700;
    color: var(--accent-color); margin-left: auto; flex-shrink: 0; }

.rd-pay-body  { padding: var(--sp-5); background: var(--bg-primary);
    border-top: 1px solid var(--border-color); }

/* CPF step */
.rd-cpf-field { display: flex; flex-direction: column; gap: var(--sp-3); margin-bottom: var(--sp-4); }
.rd-cpf-label { font-size: var(--font-size-sm); color: var(--text-secondary); font-weight: 600;
    text-transform: uppercase; letter-spacing: .05em; }
.rd-cpf-input { width: 100%; padding: var(--sp-3) var(--sp-4);
    border: 1px solid var(--border-color); border-radius: var(--border-radius-size-md);
    background: var(--bg-secondary); color: var(--text-primary); font-size: var(--font-size-mdm);
    font-family: inherit; outline: none; transition: border-color .15s; }
.rd-cpf-input:focus { border-color: var(--accent-color); }
.rd-cpf-hint { font-size: var(--font-size-xs); color: var(--text-tertiary); }
.rd-cpf-err  { font-size: var(--font-size-sm); color: var(--error-color); display: none; margin-top: var(--sp-2); }

/* QR Code */
.rd-qr-wrap { display: flex; flex-direction: column; align-items: center; gap: var(--sp-4); }
.rd-qr-img  { width: 200px; height: 200px; border-radius: var(--border-radius-size-md);
    border: 1px solid var(--border-color); background: #fff; padding: 8px; }
.rd-qr-copy-wrap { width: 100%; display: flex; flex-direction: column; gap: var(--sp-3); }
.rd-qr-code-text { font-size: var(--font-size-xs); font-family: monospace; word-break: break-all;
    background: var(--bg-secondary); border: 1px solid var(--border-color);
    border-radius: var(--border-radius-size-md); padding: var(--sp-3); color: var(--text-secondary);
    max-height: 80px; overflow-y: auto; line-height: 1.5; }
.rd-qr-timer { font-size: var(--font-size-sm); color: var(--text-secondary); text-align: center; }
.rd-qr-timer span { color: var(--accent-color); font-weight: 700; }
.rd-poll-status { text-align: center; font-size: var(--font-size-sm); color: var(--text-secondary);
    display: flex; align-items: center; justify-content: center; gap: var(--sp-2); margin-top: var(--sp-3); }
.rd-poll-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent-color);
    animation: rd-blink 1.2s ease-in-out infinite; }
@keyframes rd-blink { 0%,100%{opacity:1} 50%{opacity:.2} }

/* Spinner inline */
.rd-spinner { display: inline-block; width: 18px; height: 18px;
    border: 2px solid var(--border-color); border-top-color: var(--accent-color);
    border-radius: 50%; animation: rd-spin .7s linear infinite; }
@keyframes rd-spin { to { transform: rotate(360deg); } }

/* Locks on items when payment is required */
.rd-locked-notice { display: flex; align-items: center; gap: var(--sp-3);
    padding: var(--sp-4) var(--sp-5); background: var(--bg-warning);
    border-top: 1px solid var(--border-color); font-size: var(--font-size-sm);
    color: var(--text-warning); }
</style>
</head>
<body>
    <header>
        <div class="header-frame" id="header" data-title="" data-back="true"></div>
        <div class="control-group">
            <button id="langToggle" class="lang-btn" style="display:none" title="Change language / Mudar idioma">
                <span id="langFlag">🇧🇷</span>
            </button>
        </div>
    </header>

    <!-- Auth -->
    <div id="rd-auth">
        <div style="font-size:3rem">🔒</div>
        <h2 data-i18n="requestLoginRequired">Identificação necessária</h2>
        <p data-i18n="requestLoginRequiredDesc">Faça login para visualizar os detalhes do pedido.</p>
        <button class="om-oauth-btn om-google" id="rd-login-google" style="margin-top:var(--sp-3)">
            <svg width="18" height="18" viewBox="0 0 48 48">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.29-8.16 2.29-6.26 0-11.57-3.59-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            </svg>
            <span data-i18n="requestLoginGoogle">Entrar com Google</span>
        </button>
    </div>
        
    <div id="rd-content" style="display:none">
        <div class="adm-layout">
            <!-- Sidebar -->
            <aside class="adm-sidebar sidebar-wide">
                <div id="rd-order-sidebar" style="padding:0 var(--sp-5)"></div>
            </aside>

            <!-- Conteúdo -->
            <div class="adm-main" style="padding:0 var(--sp-5)">
                <div class="rd-loading" id="rd-loading" data-i18n="requestLoadingOrder">Carregando pedido...</div>
                <div id="rd-order-body"></div>
            </div>
        </div>
    </div>

    <div id="footer"></div>

    <script src="js/config.js"></script>
    <script src="js/translation.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.service.js"></script>
    <script src="https://accounts.google.com/gsi/client" async></script>
    <script>
const RD_CFG = {
    apiBase:      CONFIG.REQUEST_API_BASE,
    paymentsBase: CONFIG.PAYMENTS_API_BASE || 'https://payments.limaalef.com',
    googleClientId: CONFIG.GOOGLE_CLIENT_ID,
};

let rdToken = null;
let rdUser  = null;

// Estado de pagamento (preservado durante polling)
let _payState = {
    mpPaymentId:  null,
    pixCopyPaste: null,
    pixQrBase64:  null,
    amount:       null,
    expiresAt:    null,
    pollingTimer: null,
    countdownTimer: null,
};

function t(key) { return (LanguageManager ? LanguageManager.t(key) : null) || key; }

const orderId = new URLSearchParams(window.location.search).get('id');

// ── Sessão ─────────────────────────────────────────────────────────────────
function saveRdSession(token, user) {
    rdToken = token; rdUser = user;
    localStorage.setItem('rq_token', token);
    localStorage.setItem('rq_user',  JSON.stringify(user));
}
function restoreRdSession() {
    const token = localStorage.getItem('rq_token');
    const user  = localStorage.getItem('rq_user');
    if (!token) return false;
    try {
        const p = JSON.parse(atob(token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
        if (p.exp && p.exp < Math.floor(Date.now()/1000)) {
            localStorage.removeItem('rq_token'); localStorage.removeItem('rq_user'); return false;
        }
        rdToken = token;
        rdUser  = user ? JSON.parse(user) : { name: p.name || p.email, email: p.email, picture: p.picture || '' };
        return true;
    } catch { return false; }
}

// ── Auth ───────────────────────────────────────────────────────────────────
document.getElementById('rd-login-google').addEventListener('click', () => {
    if (!window.google?.accounts?.id) { alert(t('requestGSINotLoaded')); return; }
    google.accounts.id.initialize({
        client_id: RD_CFG.googleClientId,
        cancel_on_tap_outside: false,
        callback: async (response) => {
            try {
                const res = await fetch(`${RD_CFG.apiBase}/auth/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ credential: response.credential }),
                });
                if (!res.ok) { alert(t('requestLoginError')); return; }
                const data = await res.json();
                const p    = decodeJwt(response.credential);
                saveRdSession(data.token, { name: p.name || p.email, email: p.email, picture: p.picture || '' });
                showContent();
            } catch { alert(t('requestLoginError')); }
        },
    });
    google.accounts.id.prompt();
});

function showContent() {
    document.getElementById('rd-auth').style.display    = 'none';
    document.getElementById('rd-content').style.display = 'block';
    if (!orderId) { document.getElementById('rd-loading').textContent = t('requestNoOrderId'); return; }
    loadOrder();
}
if (restoreRdSession()) showContent();

// ── Carregar pedido ────────────────────────────────────────────────────────
async function loadOrder() {
    document.getElementById('rd-loading').style.display    = 'block';
    document.getElementById('rd-order-body').innerHTML      = '';
    try {
        const res = await fetch(`${RD_CFG.apiBase}/orders/${encodeURIComponent(orderId)}`, {
            headers: { Authorization: `Bearer ${rdToken}` },
        });
        if (res.status === 401) { localStorage.removeItem('rq_token'); location.reload(); return; }
        if (res.status === 403) { document.getElementById('rd-loading').textContent = t('requestOrderForbidden'); return; }
        if (res.status === 404) { document.getElementById('rd-loading').textContent = t('requestOrderNotFound'); return; }

        const order = await res.json();
        document.getElementById('rd-loading').style.display = 'none';

        const hdr = document.getElementById('header');
        if (hdr) hdr.dataset.title = order.id;
        document.title = `${order.id} | Sports Archive`;

        const detail = buildOrderDetail(order);
        document.getElementById('rd-order-body').innerHTML = detail.body;
        document.getElementById('rd-order-sidebar').innerHTML = detail.sidebar;

        // Se já tinha QR ativo (reused), iniciar polling automaticamente
        if (_payState.mpPaymentId) startPolling(_payState.mpPaymentId);

    } catch(e) {
        document.getElementById('rd-loading').textContent = '⚠ ' + e.message;
    }
}

// ── Render detalhe ─────────────────────────────────────────────────────────
function buildOrderDetail(o) {
    const now   = new Date();
    const dt    = new Date(o.createdAt).toLocaleString('pt-BR', { dateStyle:'long', timeStyle:'short' });
    const items = o.items || [];

    // Progress bar (inclui passo "Pagamento" quando o pedido está pronto)
    const steps = [
        { label: t('requestProgressReceived') },
        { label: t('requestProgressAnalysis')  },
        { label: t('requestProgressReady')     },
    ];
    const stepIdx = { pending:0, processing:1, ready:2, completed:3, expired:2, cancelled:2 };
    const curIdx  = stepIdx[o.status] ?? 0;

    const teste = `<div class="prog" style="gap:0;">
            <div class="prog-step"><div class="prog-dot done"><svg width="8" height="8" viewBox="0 0 8 8" fill="none"><path d="M1.5 4l2 2 3-3" stroke="#4ade80" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"></path></svg></div><span class="prog-lbl done">Recebido</span></div>
            <div class="prog-conn done" style="min-width:30px;"></div>
            <div class="prog-step"><div class="prog-dot done"><svg width="8" height="8" viewBox="0 0 8 8" fill="none"><path d="M1.5 4l2 2 3-3" stroke="#4ade80" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"></path></svg></div><span class="prog-lbl done">Em análise</span></div>
            <div class="prog-conn done" style="min-width:30px;"></div>
            <div class="prog-step"><div class="prog-dot active"></div></div><span class="prog-lbl active" style="color:#e8ff4a;">Pronto</span></div>
        </div>`

    const progressHtml = (o.status !== 'expired' && o.status !== 'cancelled') ? `
        <div class="prog">
            ${steps.map((s, i) => {
                let cls = '';
                if (i < curIdx)  cls = 'done';
                if (i === curIdx) cls = 'active';
                return `<div class="prog-conn ${cls}" style="min-width:30px;"></div><div class="prog-step">
                            <div class="prog-dot ${cls}">${i < curIdx ? `<svg width="12" height="12" viewBox="0 0 8 8" fill="none"><path class="prog-dot-svg ${cls}" d="M1.5 4l2 2 3-3" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"></path></svg>` : `<div class="prog-dot-svg2 ${cls}" style="width:6px;height:6px;border-radius:50%;"></div>`}</div>
                            <span class="prog-lbl ${cls}">${s.label}</span>
                        </div>`;
            }).join('')}
        </div>` : ``;

    // ── Seção de pagamento Pix ─────────────────────────────────────────────
    const paymentHtml = buildPaymentSection(o);

    // ── Cards de download ──────────────────────────────────────────────────
    // Trava os downloads se pagamento for obrigatório e não estiver pago
    const pay     = o.payment;
    const payDone = pay?.status === 'approved' || o.paymentAccessGranted === true;
    const payRequired = o.paymentAmount > 0 && !payDone;

    const dlCardsHtml = items.map(item => {
        const link    = item.link;
        // Se pagamento obrigatório e não pago, bloqueia mesmo com link ativo
        const blocked = payRequired || !link || link.disabled ||
            (link.expiresAt && new Date(link.expiresAt) < now);
        const url     = (!payRequired && link) ? (link.proxyUrl || link.url || '#') : null;

        let expText = '', expCls = '';
        if (payRequired && !payDone) {
            expText = '🔒 Aguardando confirmação do pagamento'; expCls = 'disabled';
        } else if (!link) {
            expText = t('requestLinkPending'); expCls = 'disabled';
        } else if (link.disabled) {
            expText = t('requestLinkDisabled'); expCls = 'disabled';
        } else if (link.expiresAt && new Date(link.expiresAt) < now) {
            expText = '⛔ ' + t('requestLinkExpired') + ' — ' + new Date(link.expiresAt).toLocaleDateString('pt-BR');
            expCls  = 'expired';
        } else if (!link.expiresAt) {
            expText = '∞ ' + t('requestLinkNoExpiry'); expCls = 'indefinite';
        } else {
            const days = Math.ceil((new Date(link.expiresAt) - now) / 86_400_000);
            expText    = '✓ ' + t('requestLinkValidDays').replace('{n}', days);
            expCls     = 'valid';
        }

        return `
        <div class="rd-dl-card ${(!blocked && link) ? 'available' : ''}">
            <div class="rd-dl-card-head">
                <div class="rd-dl-icon">${blocked ? '🔒' : '📥'}</div>
                <div class="rd-dl-info">
                    <div class="rd-dl-label">${esc(item.label)}</div>
                    <div class="rd-dl-sub">${esc(item.meta||'')}${item.date ? ' · ' + esc(item.date) : ''}${item.station ? ' · ' + esc(item.station) : ''}</div>
                </div>
            </div>
            ${(payRequired && !payDone)
                ? `<div class="rd-locked-notice">⚠ Realize o pagamento acima para liberar este conteúdo.</div>`
                : link
                    ? `<div class="rd-dl-card-body">
                        <div class="rd-dl-status-row">
                            <span class="rd-dl-exp ${expCls}">${expText}</span>
                            ${(!blocked && url)
                                ? `<a href="${url}" class="action-btn btn-primary" target="_blank" rel="noopener" download
                                    style="text-decoration:none">⬇ ${t('requestDownload')}</a>`
                                : ''}
                        </div>
                       </div>`
                    : `<div class="rd-dl-pending">${t('requestLinkPending')}</div>`
            }
        </div>`;
    }).join('');

    // Info
    const CONTACT_ICON = { email:'📧', whatsapp:'💬', telegram:'✈️', bluesky:'🦋', x:'𝕏' };
    const infoHtml = `
        <div class="detail-list">
            <div class="detail-list-item">
                <span class="detail-list-label" data-i18n="order">${t('order')}</span>
                <span class="detail-list-value">${esc(o.id)}</span>
            </div>
            <div class="detail-list-item">
                <span class="detail-list-label" data-i18n="date">${t('date')}</span>
                <span class="detail-list-value">${dt}</span>
            </div>
            <div class="detail-list-item">
                <span class="detail-list-label" data-i18n="requestContactInfo">${t('requestContactInfo')}</span>
                <span class="detail-list-value">
                    ${CONTACT_ICON[o.contact?.channel]||'📬'} ${esc(o.contact?.channel||'—')}: ${esc(o.contact?.value||'')}
                </span>
            </div>
            <div class="detail-list-item">
                <span class="detail-list-label" data-i18n="requestStatusLabel">${t('requestStatusLabel')}</span>
                <span class="detail-list-value"><span class="pill st-${o.status}">${statusPtBR(o.status)}</span></span>
            </div>
        </div>
        ${o.notes ? `<div class="rd-notes" style="margin-top:var(--sp-3)">📝 ${esc(o.notes)}</div>` : ''}
        
        <div class="section-divider"></div>

        ${progressHtml}

        <div class="section-divider"></div>
        
        ${paymentHtml}`;

    return {
        body: `
            <div class="rd-section">
                <div class="rd-section-title" data-i18n="requestDownloads">${t('requestDownloads')}</div>
                <div class="rd-dl-list">${dlCardsHtml}</div>
            </div>
        `,
        sidebar: `
            <div class="rd-section">
                <div class="rd-section-title" data-i18n="requestOrderInfo">${t('requestOrderInfo')}</div>
                ${infoHtml}
            </div>
        `
    };
}

// ── Seção de pagamento Pix ─────────────────────────────────────────────────
function buildPaymentSection(o) {
    // Só exibe se o pedido estiver "ready" e tiver valor configurado
    if (o.status !== 'ready') return '';
    if (!o.paymentAmount || o.paymentAmount <= 0) return '';
    // Acesso liberado manualmente pelo admin — não exibe seção de pagamento
    if (o.paymentAccessGranted === true) return '';

    const pay    = o.payment;
    const amount = 'R$ ' + parseFloat(o.paymentAmount).toLocaleString('pt-BR', { minimumFractionDigits:2 });

    // Pago
    if (pay?.status === 'approved') {
        return `
        <div class="rd-section">
            <div class="rd-section-title">Pagamento</div>
            <div class="rd-pay-card pay-done">
                <div class="rd-pay-head">
                    <span class="rd-pay-icon">✅</span>
                    <div>
                        <div class="rd-pay-title">Pagamento confirmado!</div>
                        <div class="rd-pay-sub">Pago em ${pay.paidAt ? new Date(pay.paidAt).toLocaleString('pt-BR') : '—'}</div>
                    </div>
                    <div class="rd-pay-amount">${amount}</div>
                </div>
            </div>
        </div>`;
    }

    // Cancelado/expirado
    if (pay?.status === 'cancelled') {
        return `
        <div class="rd-section">
            <div class="rd-section-title">Pagamento</div>
            <div class="rd-pay-card" style="border-color:var(--error-color)">
                <div class="rd-pay-head" style="background:var(--bg-error)">
                    <span class="rd-pay-icon">❌</span>
                    <div>
                        <div class="rd-pay-title">Pagamento cancelado</div>
                        <div class="rd-pay-sub">O tempo para pagamento expirou. Entre em contato para reativar.</div>
                    </div>
                </div>
            </div>
        </div>`;
    }

    // Aguardando pagamento — QR pendente ou ainda não criado
    const hasPendingQr = pay?.status === 'pending' && _payState.mpPaymentId;

    return `
    <div class="rd-section">
        <div class="rd-section-title">Pagamento</div>
        <div class="rd-pay-card ${hasPendingQr ? 'pay-pending' : 'pay-required'}" id="rd-pay-card">
            <div class="rd-pay-head">
                <span class="rd-pay-icon">${hasPendingQr ? '⏳' : '💳'}</span>
                <div>
                    <div class="rd-pay-title">${hasPendingQr ? 'Aguardando pagamento' : 'Pagamento necessário'}</div>
                    <div class="rd-pay-sub">${hasPendingQr ? 'Escaneie o QR Code ou copie o código Pix' : 'Realize o pagamento via Pix para receber seus conteúdos'}</div>
                </div>
                <div class="rd-pay-amount">${amount}</div>
            </div>
            <div class="rd-pay-body" id="rd-pay-body">
                ${hasPendingQr ? renderQrStep() : renderCpfStep()}
            </div>
        </div>
    </div>`;
}

function renderCpfStep() {
    return `
    <div class="rd-cpf-field">
        <label class="rd-cpf-label">CPF do pagador</label>
        <input id="rd-cpf-input" class="rd-cpf-input" type="text" maxlength="14"
            inputmode="numeric" placeholder="000.000.000-00"
            oninput="maskCpf(this)"
            onkeydown="if(event.key==='Enter') submitCpf()">
        <div class="rd-cpf-hint">Exigência fiscal do Mercado Pago para pagamentos via Pix.</div>
        <div class="rd-cpf-err" id="rd-cpf-err"></div>
    </div>
    <button class="action-btn btn-primary" style="width:100%;justify-content:center"
        onclick="submitCpf()">
        Gerar QR Code Pix →
    </button>`;
}

function renderQrStep() {
    const ps = _payState;
    return `
    <div class="rd-qr-wrap">
        ${ps.pixQrBase64
            ? `<img class="rd-qr-img" src="data:image/png;base64,${ps.pixQrBase64}" alt="QR Code Pix">`
            : `<div class="rd-qr-img" style="display:flex;align-items:center;justify-content:center;color:var(--text-tertiary)">QR Code indisponível</div>`
        }
        <div class="rd-qr-copy-wrap">
            ${ps.pixCopyPaste ? `
            <div class="rd-qr-code-text" id="rd-qr-code-text">${esc(ps.pixCopyPaste)}</div>
            <button class="action-btn btn-ghost" style="width:100%;justify-content:center"
                onclick="copyCodigo()">
                📋 Copiar código Pix
            </button>` : ''}
        </div>
        <div class="rd-qr-timer" id="rd-qr-timer">⏱ Válido por <span id="rd-countdown">—</span></div>
        <div class="rd-poll-status">
            <div class="rd-poll-dot"></div>
            Verificando pagamento automaticamente...
        </div>
    </div>`;
}

// ── CPF / Geração do QR ────────────────────────────────────────────────────
function maskCpf(input) {
    let v = input.value.replace(/\D/g, '').slice(0, 11);
    if (v.length > 9)      v = v.slice(0,3)+'.'+v.slice(3,6)+'.'+v.slice(6,9)+'-'+v.slice(9);
    else if (v.length > 6) v = v.slice(0,3)+'.'+v.slice(3,6)+'.'+v.slice(6);
    else if (v.length > 3) v = v.slice(0,3)+'.'+v.slice(3);
    input.value = v;
}

function cpfValid(cpf) {
    const d = cpf.replace(/\D/g, '');
    if (d.length !== 11 || /^(\d)\1+$/.test(d)) return false;
    let s = 0;
    for (let i = 0; i < 9; i++) s += parseInt(d[i]) * (10 - i);
    let r = (s * 10) % 11; if (r === 10 || r === 11) r = 0;
    if (r !== parseInt(d[9])) return false;
    s = 0;
    for (let i = 0; i < 10; i++) s += parseInt(d[i]) * (11 - i);
    r = (s * 10) % 11; if (r === 10 || r === 11) r = 0;
    return r === parseInt(d[10]);
}

async function submitCpf() {
    const input  = document.getElementById('rd-cpf-input');
    const errEl  = document.getElementById('rd-cpf-err');
    const cpf    = input?.value || '';

    if (!cpfValid(cpf)) {
        errEl.textContent    = 'CPF inválido. Verifique e tente novamente.';
        errEl.style.display  = 'block';
        input?.focus();
        return;
    }
    errEl.style.display = 'none';

    const body = document.getElementById('rd-pay-body');
    body.innerHTML = `<div style="text-align:center;padding:var(--sp-5)"><div class="rd-spinner"></div><div style="margin-top:var(--sp-3);color:var(--text-secondary);font-size:var(--font-size-sm)">Gerando Pix...</div></div>`;

    try {
        const res  = await fetch(`${RD_CFG.paymentsBase}/payments/create`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${rdToken}` },
            body: JSON.stringify({ orderId, cpf: cpf.replace(/\D/g, '') }),
        });
        const data = await res.json();

        if (!res.ok) {
            body.innerHTML = `
                <div style="color:var(--error-color);margin-bottom:var(--sp-4)">
                    ⚠ ${esc(data.error || 'Erro ao gerar pagamento')}
                </div>
                ${renderCpfStep()}`;
            return;
        }

        _payState.mpPaymentId  = String(data.paymentId);
        _payState.pixCopyPaste = data.pixCopyPaste;
        _payState.pixQrBase64  = data.pixQrBase64;
        _payState.amount       = data.amount;
        _payState.expiresAt    = data.expiresAt;

        body.innerHTML = renderQrStep();
        startCountdown(data.expiresAt);
        startPolling(_payState.mpPaymentId);

    } catch(e) {
        body.innerHTML = `
            <div style="color:var(--error-color);margin-bottom:var(--sp-4)">⚠ ${esc(e.message)}</div>
            ${renderCpfStep()}`;
    }
}

function copyCodigo() {
    const code = _payState.pixCopyPaste;
    if (!code) return;
    navigator.clipboard.writeText(code).then(() => {
        const btn = event.target;
        btn.textContent = '✓ Copiado!';
        setTimeout(() => { btn.textContent = '📋 Copiar código Pix'; }, 2000);
    });
}

// ── Countdown ──────────────────────────────────────────────────────────────
function startCountdown(expiresAt) {
    if (_payState.countdownTimer) clearInterval(_payState.countdownTimer);
    if (!expiresAt) return;

    function tick() {
        const el  = document.getElementById('rd-countdown');
        if (!el) { clearInterval(_payState.countdownTimer); return; }
        const ms  = new Date(expiresAt) - Date.now();
        if (ms <= 0) {
            el.textContent = 'expirado';
            clearInterval(_payState.countdownTimer);
            return;
        }
        const h = Math.floor(ms / 3_600_000);
        const m = Math.floor((ms % 3_600_000) / 60_000);
        const s = Math.floor((ms % 60_000) / 1_000);
        el.textContent = h > 0
            ? `${h}h ${m.toString().padStart(2,'0')}m`
            : `${m}m ${s.toString().padStart(2,'0')}s`;
    }
    tick();
    _payState.countdownTimer = setInterval(tick, 1000);
}

// ── Polling de status ──────────────────────────────────────────────────────
function startPolling(mpPaymentId) {
    if (_payState.pollingTimer) clearInterval(_payState.pollingTimer);

    async function poll() {
        try {
            const res  = await fetch(`${RD_CFG.paymentsBase}/payments/${mpPaymentId}/status`, {
                headers: { Authorization: `Bearer ${rdToken}` },
            });
            const data = await res.json();

            if (data.paid || data.status === 'approved') {
                clearInterval(_payState.pollingTimer);
                clearInterval(_payState.countdownTimer);
                // Recarrega o pedido para exibir os links
                loadOrder();
            } else if (data.status === 'cancelled') {
                clearInterval(_payState.pollingTimer);
                loadOrder();
            }
        } catch(e) {
            console.warn('[poll]', e.message);
        }
    }

    _payState.pollingTimer = setInterval(poll, 5000);
    poll(); // imediato
}

// ── Utils ──────────────────────────────────────────────────────────────────
function statusPtBR(s) {
    return {
        pending:   t('requestStatusPending'),
        processing: t('requestStatusProcessing'),
        ready:     t('requestStatusReady'),
        expired:   t('requestStatusExpired'),
        cancelled: t('requestStatusCancelled'),
    }[s] || s;
}

function decodeJwt(token) {
    const base64 = token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
    return JSON.parse(decodeURIComponent(
        atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')));
}

function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
